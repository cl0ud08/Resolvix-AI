version: "3.9"

services:

  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ticket-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket_db
    volumes:
      - ticket_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@auth-db:5432/auth_db
      JWT_SECRET: change-this-in-production
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8001:8001"

  ticket-service:
    build: ./ticket-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@ticket-db:5432/ticket_db
      JWT_SECRET: change-this-in-production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      ticket-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "8002:8002"

  ai-triage-service:
    build: ./ai-triage-service
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8003:8003"

  notification-service:
    build: ./notification-service
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8004:8004"

  api-gateway:
    build: ./api-gateway
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      TICKET_SERVICE_URL: http://ticket-service:8002
      NOTIFICATION_SERVICE_URL: http://notification-service:8004
    depends_on:
      auth-service:
        condition: service_started
      ticket-service:
        condition: service_started
      notification-service:
        condition: service_started
    ports:
      - "8000:8000"

volumes:
  auth_db_data:
  ticket_db_data: